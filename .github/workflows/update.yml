name: Update IPTV list

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python pescar_final.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lista_pro.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update"
          git push
