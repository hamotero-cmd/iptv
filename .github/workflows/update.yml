name: Update IPTV

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python pescar_final.py
      - run: |
          git config user.name "pezbot"
          git config user.email "pez@bot.com"
          git add lista_pro.m3u epg_fusion.xml
          git commit -m "update $(date -u +%Y-%m-%d)" || exit 0
          git push
